<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رَفِيق - عالمك السينمائي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --accent-white: #ffffff;
            --gray-text: #b0b0b0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --transition: 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--accent-white);
            overflow: hidden;
            height: 100vh;
            touch-action: none;
            /* منع المتصفح من محاولة استعادة موضع السكرول */
            scroll-behavior: auto !important;
        }

        #canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
        }

        /* --- شاشة التحميل (3 ثوانٍ) --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }
        .loader-text {
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 15px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* --- الحاوية الرئيسية --- */
        .main-container {
            height: 100vh;
            transition: transform var(--transition);
            will-change: transform;
        }

        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            position: relative;
        }

        h1 { font-size: clamp(3rem, 12vw, 6rem); font-weight: 900; margin-bottom: 15px; }
        h2 { font-size: clamp(1.8rem, 6vw, 2.8rem); margin-bottom: 20px; font-weight: 700; }
        p { font-size: clamp(1rem, 4vw, 1.3rem); color: var(--gray-text); line-height: 1.8; max-width: 850px; }

        /* --- النقاط الجانبية مع التسميات (Hover) --- */
        .side-dots {
            position: fixed;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dot-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: 0.4s;
        }

        .dot-label {
            position: absolute;
            left: 25px;
            white-space: nowrap;
            background: var(--accent-white);
            color: black;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            opacity: 0;
            transform: translateX(-10px);
            transition: 0.3s;
            pointer-events: none;
        }

        .dot-wrapper:hover .dot-label {
            opacity: 1;
            transform: translateX(0);
        }

        .dot-wrapper:hover .dot { background: var(--accent-white); }
        .dot-wrapper.active .dot { 
            background: #fff; 
            transform: scale(1.8); 
            box-shadow: 0 0 15px #fff; 
        }

        /* --- البطاقات والأزرار --- */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px 20px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 700px;
        }

        .hero-download {
            margin-top: 35px;
            padding: 18px 45px;
            background: var(--accent-white);
            color: black;
            font-weight: 900;
            text-decoration: none;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.4s;
        }

        .hero-download:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.2);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        .info-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .info-item strong { display: block; font-size: 1.2rem; margin-bottom: 5px; }
        .info-item span { font-size: 0.9rem; color: var(--gray-text); }

        .icon { font-size: 3.5rem; margin-bottom: 20px; filter: grayscale(100%) brightness(200%); }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.95); } }

        @media (max-width: 768px) {
            section { padding: 0 7%; }
            .side-dots { left: 15px; }
            .dot-label { display: none; }
            .glass-card { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <h1>ds</h1>
</body>
</html>
